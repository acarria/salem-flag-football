services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flagfootball
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/app
    env_file:
      - ./apps/api/.env
      - .env
    ports:
      # NOTE: Binds to all interfaces for Docker Desktop compatibility.
      # In production, the backend runs on Lambda — not exposed via Docker.
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command: pnpm next dev --hostname 0.0.0.0
    working_dir: /workspace/apps/web
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages/types:/workspace/packages/types
      - /workspace/apps/web/node_modules
      - /workspace/apps/web/.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

volumes:
  postgres_data: 