name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "docker-compose.test.yml"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "docker-compose.test.yml"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flagfootball_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-test.txt

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Lint
        working-directory: apps/api
        run: pip install ruff && ruff check app/

      - name: Run tests
        working-directory: apps/api
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/flagfootball_test
          CLERK_JWKS_URL: https://test.clerk.dev/.well-known/jwks.json
          CLERK_ISSUER: https://test.clerk.dev/
          CLERK_SECRET_KEY: sk_test_placeholder
          TESTING: "true"
          TEST_BYPASS_TOKEN: ${{ secrets.TEST_BYPASS_TOKEN }}
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          flags: backend
