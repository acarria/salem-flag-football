name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flagfootball
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Run database migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flagfootball
        run: alembic upgrade head

      - name: Start backend
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flagfootball
          CLERK_JWKS_URL: https://test.clerk.dev/.well-known/jwks.json
          CLERK_ISSUER: https://test.clerk.dev/
          CLERK_SECRET_KEY: sk_test_placeholder
          TESTING: "true"
          TEST_BYPASS_TOKEN: ${{ secrets.TEST_BYPASS_TOKEN }}
        run: |
          uvicorn app.main:app --port 8000 &
          until curl -sf http://localhost:8000/health; do sleep 1; done

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install frontend dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          TEST_BYPASS_TOKEN: ${{ secrets.TEST_BYPASS_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flagfootball
          CLERK_JWKS_URL: https://test.clerk.dev/.well-known/jwks.json
          CLERK_ISSUER: https://test.clerk.dev/
          TESTING: "true"
        run: pnpm exec playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
