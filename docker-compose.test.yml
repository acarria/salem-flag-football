# Ephemeral test database — separate from the dev DB.
# Port 5433 avoids conflicts when the dev stack (port 5432) is also running.
# tmpfs means no data persists between test runs; startup is fast.
services:
  test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flagfootball_test
    ports:
      - "127.0.0.1:5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
